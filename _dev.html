<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dev Hub — Gold & Black</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #C9A84C;
      --gold-gradient: linear-gradient(135deg, #C9A84C 0%, #F5D376 50%, #C9A84C 100%);
      --black: #0A0A0A;
      --white: #F5F0E8;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 3rem 2rem;
      gap: 3rem;
    }

    .hub-title {
      font-family: 'Black Ops One', sans-serif;
      font-size: 2rem; letter-spacing: 0.12em;
      background: var(--gold-gradient);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }
    .hub-badge {
      font-size: 0.6rem; letter-spacing: 0.45em; text-transform: uppercase;
      color: rgba(201,168,76,0.45); font-weight: 700;
      text-align: center;
      margin-top: 0.4rem;
    }

    .hub-sep {
      width: 60px; height: 1px;
      background: var(--gold-gradient);
    }

    .hub-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.2rem;
      width: 100%; max-width: 760px;
    }

    .hub-card {
      display: flex; flex-direction: column; gap: 0.4rem;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(201,168,76,0.15);
      border-left: 3px solid rgba(201,168,76,0.5);
      border-radius: 2px;
      padding: 1.4rem 1.6rem;
      text-decoration: none;
      color: var(--white);
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
      position: relative;
    }
    .hub-card:hover {
      border-color: rgba(201,168,76,0.8);
      border-left-color: var(--gold);
      background: rgba(201,168,76,0.06);
      transform: translateX(4px);
    }
    .hub-card-label {
      font-size: 0.58rem; letter-spacing: 0.4em; text-transform: uppercase;
      color: rgba(201,168,76,0.45); font-weight: 700;
    }
    .hub-card-name {
      font-size: 1rem; font-weight: 700; letter-spacing: 0.04em;
    }
    .hub-card-file {
      font-size: 0.7rem; color: rgba(245,240,232,0.3); letter-spacing: 0.05em;
      font-weight: 400;
    }
    .hub-card-arrow {
      position: absolute; right: 1.2rem; top: 50%; transform: translateY(-50%);
      color: rgba(201,168,76,0.35);
      font-size: 1rem;
      transition: color 0.2s, right 0.2s;
    }
    .hub-card:hover .hub-card-arrow {
      color: var(--gold);
      right: 0.9rem;
    }

    .hub-footer {
      font-size: 0.62rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: rgba(245,240,232,0.15); font-weight: 600;
      text-align: center;
    }
  </style>
</head>
<body>

  <div>
    <p class="hub-badge">Gold &amp; Black — Dev Navigation</p>
    <h1 class="hub-title">HUB PAGES</h1>
  </div>

  <div class="hub-sep"></div>

  <div class="hub-grid">

    <a class="hub-card" href="index.html">
      <span class="hub-card-label">Page principale</span>
      <span class="hub-card-name">Accueil</span>
      <span class="hub-card-file">index.html</span>
      <span class="hub-card-arrow">→</span>
    </a>

    <a class="hub-card" href="horaires.html">
      <span class="hub-card-label">Sous-page</span>
      <span class="hub-card-name">Horaires</span>
      <span class="hub-card-file">horaires.html</span>
      <span class="hub-card-arrow">→</span>
    </a>

    <a class="hub-card" href="adresse.html">
      <span class="hub-card-label">Sous-page</span>
      <span class="hub-card-name">Adresse</span>
      <span class="hub-card-file">adresse.html</span>
      <span class="hub-card-arrow">→</span>
    </a>

    <a class="hub-card" href="informations.html">
      <span class="hub-card-label">Sous-page</span>
      <span class="hub-card-name">Informations</span>
      <span class="hub-card-file">informations.html</span>
      <span class="hub-card-arrow">→</span>
    </a>

    <a class="hub-card" href="reseaux.html">
      <span class="hub-card-label">Sous-page</span>
      <span class="hub-card-name">Réseaux Sociaux</span>
      <span class="hub-card-file">reseaux.html</span>
      <span class="hub-card-arrow">→</span>
    </a>

  </div>

  <p class="hub-footer">Fichier de développement — ne pas déployer</p>

</body>
</html>
